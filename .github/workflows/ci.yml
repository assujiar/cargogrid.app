# CargoGrid CI baseline — Phase 0 (CG-S5-PH0-009, Prompt 88).
#
# Platform choice: docs/adr/ADR-0004-cicd-platform.md (GitHub Actions —
# "integrated with this repository's Git host," ADR-CAND-ARCH-024).
# Policy this workflow implements: docs/git/GIT_STRATEGY.md §3 (mandatory PR,
# trunk-based) and §7 (this is the mandatory, not merely recommended, path
# once branch protection requires it — see docs/build-log/phase-00/PH0-88.md).
#
# Scope note: this is the MINIMUM trusted baseline for the current
# repository state. Gates that require a real subject (accessibility-against-
# real-UI, build) are deliberately NOT wired here — there is nothing yet for
# them to run against. Adding a fabricated passing step for a gate with no real
# subject would be worse than omitting it. See docs/build-log/phase-00/PH0-88.md
# §3 for the exact "N/A for now, wired when X lands" table.
#
# `db` job added at CG-S6-PLT-002 (Prompt 105, Tenant Provisioning and
# Lifecycle) — the first Platform Core capability to ship a real migration.
# Runs every supabase/migrations/*.sql file plus scripts/db-tests/*.sql
# against a real, disposable Postgres service container (not a fabricated
# always-pass gate) — see scripts/db-tests/run.sh.
#
# `e2e` job added at CG-S5-PH0-012 (Prompt 91, Testing Foundation —
# ADR-0007/ADR-0008): runs the real Playwright + @axe-core/playwright smoke
# suite (e2e/smoke.spec.ts) against synthetic inline content only — proves
# the browser-automation/accessibility-checker layer is wired, not a test of
# any real CargoGrid page (none exists yet, docs/standards/TESTING_STANDARDS.md
# §7's NOT_RUN table). Runs in parallel with `quality`, not serialized after
# it (docs/standards/TESTING_STANDARDS.md §3 — no shared migrated-schema
# dependency exists yet to force ordering).
#
# No secret is defined or required by any step below — nothing in this
# repository yet needs one. Triggered by `pull_request` (not
# `pull_request_target`), so a fork's PR runs with GitHub's default
# read-only token and no repository secrets (docs/build-log/phase-00/PH0-88.md
# §4 explains this choice explicitly).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel a superseded run for the same ref — avoids burning runner time on
# stale pushes to the same PR/branch (Prompt 88 §3 "concurrency/cancellation").
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege (§26): read-only, no write/deploy/secret access. No other
# permission is requested because no step below needs one.
permissions:
  contents: read

jobs:
  quality:
    name: Quality gates (typecheck, lint, test, policy checks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history, not a shallow clone — required for the base-ref
          # diffing check-protected-paths.ts performs below (git diff
          # origin/<base>...HEAD only resolves with real history present).
          fetch-depth: 0

      - name: Enable Corepack (pins pnpm to package.json's "packageManager" field)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies (frozen lockfile — deterministic install)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Suppression governance check
        run: pnpm run standards:check

      - name: Documentation checks (link resolution, canonical files, ADR index, HANDOFF coherence)
        run: pnpm run docs:check

      - name: Secret scan (docs/standards/SECURITY_STANDARDS.md §3)
        run: pnpm run security:check

      - name: Data-classification registry check (docs/standards/DATA_CLASSIFICATION_STANDARDS.md §6/§7)
        run: pnpm run data-classification:check

      - name: Threat model register check (docs/security/THREAT_MODEL.md)
        run: pnpm run threat-model:check

      - name: Branch name check (PR only)
        if: github.event_name == 'pull_request'
        run: node --experimental-strip-types scripts/git/check-branch-name.ts "${{ github.head_ref }}"

      - name: Commit message check (PR head commit only)
        if: github.event_name == 'pull_request'
        run: node --experimental-strip-types scripts/git/check-commit-message.ts --message "$(git log -1 --format=%s ${{ github.event.pull_request.head.sha }})"

      - name: Protected-path check (PR diff against base branch)
        if: github.event_name == 'pull_request'
        run: node --experimental-strip-types scripts/git/check-protected-paths.ts "origin/${{ github.base_ref }}...${{ github.event.pull_request.head.sha }}"

      - name: Evidence summary
        if: always()
        run: |
          {
            echo "### CI evidence — commit \`${{ github.sha }}\`"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Node | $(node --version) |"
            echo "| pnpm | $(pnpm --version) |"
            echo "| Event | ${{ github.event_name }} |"
            echo "| Ref | ${{ github.ref }} |"
            echo "| Workflow run | ${{ github.run_id }} (attempt ${{ github.run_attempt }}) |"
          } >> "$GITHUB_STEP_SUMMARY"

  db:
    name: Database migrations + RLS tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      # PLT-134/ADR-0014: postgis/postgis:17-3.4 (Postgres 17, matching this workflow's
      # own prior plain postgres:17 pin, plus PostGIS 3.4 — required since
      # 20260722090000_enable_postgis_spatial_foundation.sql's own `create extension
      # postgis` needs the extension's control/library files present in the image, not
      # merely installable at runtime).
      postgres:
        image: postgis/postgis:17-3.4
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Migrations and RLS tests (scripts/db-tests/run.sh)
        env:
          DATABASE_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: bash scripts/db-tests/run.sh

  e2e:
    name: E2E/accessibility smoke (Playwright + axe-core)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack (pins pnpm to package.json's "packageManager" field)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies (frozen lockfile — deterministic install)
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium (matches playwright.config.ts's single chromium project)
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E/accessibility smoke
        run: pnpm run test:e2e

      - name: Upload Playwright report (only on failure — no real tenant/app data, synthetic fixtures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
